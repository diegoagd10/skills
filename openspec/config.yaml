# OpenSpec project config — ai-harness-setup
#
# Only the four spec-driven ARTIFACTS accept rules: proposal, specs, design, tasks.
# OpenSpec ignores rules for apply/verify/archive (they are workflow phases, not
# artifacts) — that guidance lives in AGENTS.md, not here.
#
# YAML gotcha: any value containing ": " must be quoted, otherwise it is parsed as
# a map instead of a string (e.g. - "Run: scripts/verify").

schema: spec-driven

context: |
  Tech stack: Go 1.25.6 CLI source (cli/), TypeScript plugin (agent-clis/opencode/plugins/).
  Target migration stack: Python with uv, ruff, pytest, coverage, typer, and rich.
  Architecture: Harness installer and SDD helper CLI for AI dev tooling; migration is hybrid until Go can be removed safely.
  Migration focus: first slice ports sdd-status and sdd-continue behavior while preserving command names, flags, JSON schema, file paths, and exit codes. Typer owns CLI parsing/help/dispatch; Rich is limited to human-readable terminal rendering.
  Testing: Go stdlib test runner (go test), bash E2E (e2e/e2e_test.sh), bun test for plugin; Python target uses uv run pytest with coverage.
  Style: Conventional commits, no Co-Authored-By.

rules:
  proposal:
    - Include a rollback plan for risky changes
    - Identify the packages/modules affected by the change
    - Preserve machine-readable JSON compatibility for migrated commands
    - Preserve Typer command registration compatibility for migrated hyphenated command names
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with their rationale
    - Add diagrams for complex flows when they reduce cognitive load
    - Keep rich at the human-rendering boundary; deterministic logic must not depend on terminal rendering
    - Keep Typer at the CLI boundary; SDD resolution must not depend on CLI framework objects
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, ...)
    - Keep each task small enough to complete in one session

testing:
  strict_tdd: true
  runner:
    - name: Go test
      command: go test ./...
      layers:
        - unit
    - name: Python pytest
      command: uv run pytest
      layers:
        - unit
        - integration
      target: migration
  e2e:
    - name: bash E2E
      command: bash e2e/e2e_test.sh
  plugin:
    - name: bun test
      command: bun test
      path: agent-clis/opencode/plugins/
  coverage:
    available: true
    command: uv run pytest --cov
    target: migration
  quality:
    linter: ruff
    type_checker: false
    formatter: ruff format
